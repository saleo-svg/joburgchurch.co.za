<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img">
  <title>Church Community Events  Johannesburg Bible Study Church</title>
  <defs>
    <linearGradient id="eg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <radialGradient id="eglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#eg1)"/>
  <ellipse cx="300" cy="200" rx="250" ry="180" fill="url(#eglow)"/>
  <!-- Calendar icon -->
  <g transform="translate(200, 60)" filter="url(#shadow)">
    <rect x="0" y="20" width="200" height="180" rx="16" fill="#ffffff" opacity="0.12"/>
    <rect x="0" y="20" width="200" height="50" rx="16" fill="#ffffff" opacity="0.2"/>
    <!-- Calendar top bar -->
    <rect x="0" y="20" width="200" height="50" rx="16" fill="#fbbf24" opacity="0.8"/>
    <rect x="0" y="50" width="200" height="20" fill="#fbbf24" opacity="0.8"/>
    <!-- Calendar rings -->
    <rect x="40" y="8" width="12" height="32" rx="6" fill="#ffffff" opacity="0.6"/>
    <rect x="148" y="8" width="12" height="32" rx="6" fill="#ffffff" opacity="0.6"/>
    <!-- Calendar grid lines -->
    <g stroke="#ffffff" stroke-width="1" stroke-opacity="0.3">
      <line x1="20" y1="110" x2="180" y2="110"/>
      <line x1="20" y1="140" x2="180" y2="140"/>
      <line x1="20" y1="170" x2="180" y2="170"/>
      <line x1="73" y1="85" x2="73" y2="200"/>
      <line x1="126" y1="85" x2="126" y2="200"/>
    </g>
    <!-- Highlighted dates -->
    <rect x="78" y="95" width="30" height="28" rx="6" fill="#fbbf24" opacity="0.9"/>
    <rect x="126" y="95" width="30" height="28" rx="6" fill="#34d399" opacity="0.8"/>
    <rect x="78" y="125" width="30" height="28" rx="6" fill="#34d399" opacity="0.6"/>
  </g>
  <!-- Clock -->
  <g transform="translate(460, 260)">
    <circle cx="0" cy="0" r="55" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.2" stroke-width="2"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
    <!-- Clock hands -->
    <line x1="0" y1="0" x2="0" y2="-28" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="20" y2="10" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <circle cx="0" cy="0" r="4" fill="#fbbf24"/>
    <!-- Hour marks -->
    <g stroke="#ffffff" stroke-opacity="0.4" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="-40" x2="0" y2="-36"/>
      <line x1="40" y1="0" x2="36" y2="0"/>
      <line x1="0" y1="40" x2="0" y2="36"/>
      <line x1="-40" y1="0" x2="-36" y2="0"/>
    </g>
  </g>
  <!-- Confetti dots -->
  <g fill="#fbbf24" opacity="0.5"><circle cx="80" cy="300" r="4"/><circle cx="120" cy="350" r="3"/><circle cx="50" cy="340" r="3"/></g>
  <g fill="#34d399" opacity="0.5"><circle cx="520" cy="320" r="4"/><circle cx="480" cy="360" r="3"/><circle cx="550" cy="350" r="3"/></g>
  <g fill="#f472b6" opacity="0.5"><circle cx="300" cy="350" r="4"/><circle cx="260" cy="370" r="3"/><circle cx="340" cy="365" r="3"/></g>
  <!-- Stars -->
  <g fill="#ffffff" opacity="0.2"><circle cx="50" cy="60" r="2"/><circle cx="500" cy="50" r="1.5"/><circle cx="560" cy="150" r="2"/></g>
</svg>
