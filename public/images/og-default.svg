<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <title>Johannesburg Bible Study Church  Bible study and community in Sandton, Johannesburg</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="40%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1e40af" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#light)"/>
  <ellipse cx="850" cy="315" rx="500" ry="350" fill="url(#glow)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="100" cy="100" r="120" fill="none" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.1"/>
  <circle cx="1100" cy="530" r="60" fill="none" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.15"/>
  <circle cx="1100" cy="530" r="90" fill="none" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.08"/>

  <!-- Community dots pattern -->
  <g fill="#ffffff" fill-opacity="0.05">
    <circle cx="50" cy="300" r="3"/><circle cx="90" cy="350" r="3"/><circle cx="60" cy="420" r="3"/>
    <circle cx="1150" cy="200" r="3"/><circle cx="1130" cy="260" r="3"/><circle cx="1160" cy="150" r="3"/>
    <circle cx="300" cy="580" r="3"/><circle cx="360" cy="600" r="3"/><circle cx="420" cy="560" r="3"/>
  </g>

  <!-- Cross symbol -->
  <g transform="translate(80, 200)" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5">
    <line x1="0" y1="8" x2="0" y2="52"/>
    <line x1="-16" y1="24" x2="16" y2="24"/>
  </g>

  <!-- Book / Bible icon -->
  <g transform="translate(940, 180)" filter="url(#soft-shadow)">
    <rect x="0" y="0" width="140" height="180" rx="12" fill="#1e40af" opacity="0.7"/>
    <rect x="10" y="10" width="120" height="160" rx="8" fill="#1d4ed8" opacity="0.6"/>
    <!-- Bible pages -->
    <rect x="18" y="20" width="104" height="140" rx="4" fill="#bfdbfe" opacity="0.3"/>
    <!-- Cross on book -->
    <line x1="70" y1="55" x2="70" y2="105" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="52" y1="72" x2="88" y2="72" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <!-- Text lines -->
    <line x1="30" y1="120" x2="112" y2="120" stroke="#93c5fd" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="30" y1="132" x2="90" y2="132" stroke="#93c5fd" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="30" y1="144" x2="100" y2="144" stroke="#93c5fd" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- People silhouettes -->
  <g opacity="0.15" fill="#ffffff">
    <!-- Person 1 -->
    <ellipse cx="180" cy="440" rx="12" ry="12"/>
    <path d="M168,452 Q180,445 192,452 L188,500 Q180,505 172,500 Z"/>
    <!-- Person 2 -->
    <ellipse cx="230" cy="435" rx="12" ry="12"/>
    <path d="M218,447 Q230,440 242,447 L238,500 Q230,505 222,500 Z"/>
    <!-- Person 3 -->
    <ellipse cx="280" cy="445" rx="11" ry="11"/>
    <path d="M269,456 Q280,449 291,456 L287,498 Q280,503 273,498 Z"/>
    <!-- Person 4 -->
    <ellipse cx="330" cy="438" rx="11" ry="11"/>
    <path d="M319,449 Q330,442 341,449 L337,496 Q330,501 323,496 Z"/>
    <!-- Person 5 (smaller, background) -->
    <ellipse cx="370" cy="448" rx="9" ry="9"/>
    <path d="M361,457 Q370,451 379,457 L376,490 Q370,494 364,490 Z"/>
  </g>

  <!-- Sun rays decoration -->
  <g transform="translate(500, 150)" opacity="0.08" stroke="#ffffff" stroke-width="1" fill="none">
    <line x1="0" y1="-80" x2="0" y2="-120"/><line x1="57" y1="-57" x2="85" y2="-85"/>
    <line x1="80" y1="0" x2="120" y2="0"/><line x1="57" y1="57" x2="85" y2="85"/>
    <line x1="0" y1="80" x2="0" y2="120"/><line x1="-57" y1="57" x2="-85" y2="85"/>
    <line x1="-80" y1="0" x2="-120" y2="0"/><line x1="-57" y1="-57" x2="-85" y2="-85"/>
  </g>

  <!-- Divider dots -->
  <g fill="#fbbf24" opacity="0.7">
    <circle cx="580" cy="310" r="4"/><circle cx="600" cy="310" r="4"/><circle cx="620" cy="310" r="4"/>
  </g>
</svg>
